<!DOCTYPE html>
<html>
<head>
    <title>Interview Reports</title>
</head>
<body>

<h1>Interview Reports</h1>

<table border="1">

<tr>
    <th>Name</th>
    <th>Subject</th>
    <th>Score</th>
    <th>Percentage</th>
</tr>

{% for row in data %}

<tr>
    <td>{{ row['name'] }}</td>
    <td>{{ row['subject'] }}</td>
    <td>{{ row['score'] }}</td>
    <td>{{ row['percentage'] }}</td>
</tr>

{% endfor %}

</table>

<br><br>

<a href="/">Back To Home</a>

</body>
</html>
